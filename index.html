<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>G6 Imobiliário</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b1120;
  --surface: #131c2e;
  --surface2: #1a2640;
  --border: #1e3050;
  --text: #e2e8f0;
  --muted: #64748b;
  --sky: #38bdf8;
  --green: #22c55e;
  --yellow: #facc15;
  --red: #ef4444;
  --radius: 12px;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 24px 32px 0;
  margin-bottom: 28px;
}
header .logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--sky), #0ea5e9);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(56,189,248,.25);
}
header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
header span { color: var(--muted); font-size: 13px; margin-top: 2px; display: block; }

.container { padding: 0 32px 40px; }

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px 22px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: border-color .2s;
}
.card:hover { border-color: #2d4a70; }
.card-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
  flex-shrink: 0;
}
.card-icon.blue  { background: rgba(56,189,248,.12); }
.card-icon.green { background: rgba(34,197,94,.12); }
.card-icon.amber { background: rgba(251,191,36,.12); }
.card-info { display: flex; flex-direction: column; gap: 2px; }
.card-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
.card-value { font-size: 28px; font-weight: 700; line-height: 1; }
.card-value.blue  { color: var(--sky); }
.card-value.green { color: var(--green); }
.card-value.amber { color: var(--yellow); }

.pipeline {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.step {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 8px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  font-size: 12px;
  color: var(--muted);
  user-select: none;
}
.step:hover { border-color: var(--sky); color: var(--text); transform: translateY(-1px); }
.step.active { border-color: var(--sky); background: rgba(56,189,248,.08); color: var(--sky); }
.step strong { display: block; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.step.active strong { color: var(--sky); }
.step.clear { background: var(--surface2); color: var(--muted); font-size: 11px; }
.step.clear:hover { color: var(--text); }

.form-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px 24px;
  border-radius: var(--radius);
  margin-bottom: 20px;
}
.form-box h3 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }
.form-grid {
  display: grid;
  grid-template-columns: 2fr 2fr 1.5fr 1.5fr 1.5fr 1.5fr auto;
  gap: 10px;
  align-items: end;
}
.form-grid label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--muted); }
.form-grid input,
.form-grid select {
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
  width: 100%;
}
.form-grid input:focus,
.form-grid select:focus { border-color: var(--sky); }
.btn-add {
  padding: 10px 20px;
  background: var(--sky);
  color: #0b1120;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s, transform .1s;
  height: 38px;
}
.btn-add:hover { opacity: .9; transform: translateY(-1px); }

.table-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13.5px; }
thead { background: var(--surface2); }
th {
  padding: 13px 14px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }
tbody tr.row-aprovado    { border-left: 3px solid var(--green); }
tbody tr.row-condicionado { border-left: 3px solid var(--yellow); }
tbody tr.row-reprovado   { border-left: 3px solid var(--red); }
td { padding: 11px 14px; vertical-align: middle; }

.table-input {
  width: 100%;
  background: transparent;
  color: var(--text);
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 8px;
  text-align: center;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.table-input:focus { border-color: var(--border); background: var(--bg); }

.select-table {
  background: transparent;
  color: var(--text);
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 8px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  transition: border-color .2s;
}
.select-table:hover, .select-table:focus { border-color: var(--border); background: var(--bg); }

.retorno-select { font-weight: 600; font-size: 12px; text-align: center; width: 140px; }
.retorno-select.aprovado     { color: var(--green); }
.retorno-select.condicionado { color: var(--yellow); }
.retorno-select.reprovado    { color: var(--red); }

.badge-etapa {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}

.actions { display: flex; gap: 6px; justify-content: center; }
.btn-icon {
  width: 32px; height: 32px;
  border: none; border-radius: 8px;
  cursor: pointer; font-size: 14px;
  display: grid; place-items: center;
  transition: all .15s;
  position: relative;
}
.btn-next   { background: rgba(34,197,94,.15); color: var(--green); }
.btn-delete { background: rgba(239,68,68,.15); color: var(--red); }
.btn-next:hover   { background: var(--green); color: #fff; transform: scale(1.1); }
.btn-delete:hover { background: var(--red);   color: #fff; transform: scale(1.1); }
.btn-icon::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%; transform: translateX(-50%);
  background: #0f172a;
  color: var(--text);
  font-size: 11px;
  white-space: nowrap;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
.btn-icon:hover::after { opacity: 1; }

.registro-box {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 14px 18px;
  border-radius: 10px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.registro-box b { color: var(--sky); font-size: 13px; }
.registro-box select {
  padding: 7px 10px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
.btn-registro-link {
  padding: 7px 14px;
  background: rgba(56,189,248,.15);
  color: var(--sky);
  border: 1px solid rgba(56,189,248,.3);
  border-radius: 7px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: background .2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-registro-link:hover { background: rgba(56,189,248,.25); }
.btn-salvar-reg {
  padding: 7px 14px;
  background: rgba(34,197,94,.15);
  color: var(--green);
  border: 1px solid rgba(34,197,94,.3);
  border-radius: 7px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background .2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-salvar-reg:hover { background: rgba(34,197,94,.25); }

.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  place-items: center;
}
.modal-overlay.open { display: grid; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 32px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  animation: pop .15s ease;
}
@keyframes pop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h3 { font-size: 17px; margin-bottom: 8px; }
.modal p  { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.modal-btns button {
  padding: 9px 24px; border-radius: 8px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
}
.modal-btns button:hover { opacity: .85; }
.btn-cancel  { background: var(--surface2); color: var(--text); }
.btn-confirm { background: var(--red); color: #fff; }

.empty { padding: 48px 20px; text-align: center; color: var(--muted); }
.empty .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty p { font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">🏦</div>
  <div>
    <h1>G6 Imobiliário</h1>
    <span>Gestão de clientes e pipeline</span>
  </div>
  <div id="status-bar" style="display:none;margin-left:auto;padding:5px 14px;border-radius:8px;font-size:12px;font-weight:600;transition:all .3s;"></div>
</header>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="card-icon blue">👥</div>
      <div class="card-info">
        <span class="card-label">Total de Clientes</span>
        <span class="card-value blue" id="totalClientes">0</span>
      </div>
    </div>
    <div class="card">
      <div class="card-icon green">✅</div>
      <div class="card-info">
        <span class="card-label">Aprovados</span>
        <span class="card-value green" id="totalAprovados">0</span>
      </div>
    </div>
    <div class="card">
      <div class="card-icon amber">📝</div>
      <div class="card-info">
        <span class="card-label">Em Contratação</span>
        <span class="card-value amber" id="totalContratacao">0</span>
      </div>
    </div>
  </div>

  <div class="pipeline" id="pipeline"></div>

  <div class="form-box">
    <h3>Adicionar Cliente</h3>
    <div class="form-grid">
      <label>Nome<input id="nome" placeholder="Nome completo"></label>
      <label>Parceiro<input id="parceiro" placeholder="Parceiro"></label>
      <label>Retorno
        <select id="retorno">
          <option value="aprovado">Aprovado</option>
          <option value="condicionado">Condicionado</option>
          <option value="reprovado">Reprovado</option>
        </select>
      </label>
      <label>Financiamento<input id="valor" placeholder="R$ 0,00"></label>
      <label>Valor Imóvel<input id="valorImovel" placeholder="R$ 0,00"></label>
      <label>Banco
        <select id="bancos">
          <option>Bradesco</option><option>Itaú</option><option>Santander</option><option>Inter</option><option>Caixa</option>
        </select>
      </label>
      <button class="btn-add">+ Adicionar</button>
    </div>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Nome</th><th>Parceiro</th><th>Retorno</th><th>Financiamento</th>
          <th>Valor Imóvel</th><th>Status</th><th>Etapa</th><th>Banco</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>⚠️ Excluir cliente?</h3>
    <p>Essa ação não pode ser desfeita.</p>
    <div class="modal-btns">
      <button class="btn-cancel">Cancelar</button>
      <button class="btn-confirm">Excluir</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAi-xqHKf3POtrpYS5CZfre7g1PscSFtAk",
  authDomain: "g6-imob-5f6d9.firebaseapp.com",
  databaseURL: "https://g6-imob-5f6d9-default-rtdb.firebaseio.com",
  projectId: "g6-imob-5f6d9",
  storageBucket: "g6-imob-5f6d9.firebasestorage.app",
  messagingSenderId: "553843254567",
  appId: "1:553843254567:web:a23b85b852fab7ec297502",
  measurementId: "G-EWWFSNJ9F1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const clientesRef = ref(db, "clientes");

const etapas = ["Atendido","Aprovado","Contratação","Engenharia","Jurídico","Assinatura","Registro","Pagamento"];
let clientes = [];
let filtroEtapa = null;
let indexParaExcluir = null;

// ── Indicador de status de conexão ──
function setStatus(msg, cor) {
  const el = document.getElementById("status-bar");
  if (!el) return;
  el.textContent = msg;
  el.style.background = cor === "ok" ? "rgba(34,197,94,.15)" : cor === "err" ? "rgba(239,68,68,.15)" : "rgba(251,191,36,.15)";
  el.style.color = cor === "ok" ? "#22c55e" : cor === "err" ? "#ef4444" : "#facc15";
  el.style.display = "block";
  if (cor === "ok") setTimeout(() => el.style.display = "none", 2000);
}

// ── Escuta em tempo real — qualquer mudança no Firebase atualiza a tela ──
onValue(clientesRef, (snapshot) => {
  const data = snapshot.val();
  clientes = data ? Object.values(data) : [];
  render();
  setStatus("✓ Sincronizado", "ok");
}, (error) => {
  setStatus("⚠ Sem conexão com o banco", "err");
});

function salvar() {
  const obj = {};
  clientes.forEach((c, i) => { obj[i] = c; });
  set(clientesRef, obj)
    .then(() => setStatus("✓ Salvo", "ok"))
    .catch(() => setStatus("⚠ Erro ao salvar", "err"));
}

function obterLinkRegistro(r){
  if(r==="1") return "https://1riflorianopolis-sc.sistemaasgard.com.br/app/v1/#/acompanhamento-online";
  if(r==="2") return "https://2riflorianopolis-sc.sistemaasgard.com.br/app/v1/#/acompanhamento-online";
  return "";
}

function adicionarCliente(){
  const n=document.getElementById("nome"), p=document.getElementById("parceiro"),
        r=document.getElementById("retorno"), v=document.getElementById("valor"),
        vi=document.getElementById("valorImovel"), b=document.getElementById("bancos");
  if(!n.value.trim()){ n.focus(); return; }
  clientes.push({ nome:n.value.trim(), parceiro:p.value.trim(), retorno:r.value,
    valor:v.value.trim(), valorImovel:vi.value.trim(), status:"", bancos:b.value,
    etapa:0, registro:"", registroSalvo:false });
  n.value=""; p.value=""; v.value=""; vi.value=""; r.value="aprovado"; b.value="Bradesco";
  salvar();
}

function pedirExclusao(i){ indexParaExcluir=i; document.getElementById("modalOverlay").classList.add("open"); }
function fecharModal(){ indexParaExcluir=null; document.getElementById("modalOverlay").classList.remove("open"); }
function confirmarExclusao(){ if(indexParaExcluir!==null){ clientes.splice(indexParaExcluir,1); salvar(); } fecharModal(); }

function avancar(i){ if(clientes[i].etapa<etapas.length-1){ clientes[i].etapa++; salvar(); }}
function alterarRetorno(i,v){ clientes[i].retorno=v; salvar(); }
function alterarStatus(i,v){ clientes[i].status=v; salvar(); }
function alterarBanco(i,v){ clientes[i].bancos=v; salvar(); }
function alterarCampoRegistro(i,campo,v){ clientes[i][campo]=v; clientes[i].registroSalvo=false; salvar(); }
function salvarRegistro(i){ clientes[i].registroSalvo=true; salvar(); }
function filtrarEtapa(i){ filtroEtapa=i; render(); }
function limparFiltro(){ filtroEtapa=null; render(); }

function render(){
  const tbody=document.getElementById("tabela");
  tbody.innerHTML="";
  let lista = filtroEtapa!==null ? clientes.filter(c=>c.etapa===filtroEtapa) : clientes;

  if(!lista.length){
    tbody.innerHTML=`<tr><td colspan="9"><div class="empty"><div class="empty-icon">🏘️</div><p>Nenhum cliente encontrado.</p></div></td></tr>`;
    atualizarDashboard(); atualizarPipeline(); return;
  }

  lista.forEach(c=>{
    const i=clientes.indexOf(c);
    const row=document.createElement("tr");
    row.className=`row-${c.retorno}`;
    row.innerHTML=`
      <td style="font-weight:600">${c.nome}</td>
      <td style="color:var(--muted)">${c.parceiro||'—'}</td>
      <td>
        <select onchange="window._g6.alterarRetorno(${i},this.value)" class="select-table retorno-select ${c.retorno}">
          <option value="aprovado" ${c.retorno==="aprovado"?"selected":""}>✅ Aprovado</option>
          <option value="condicionado" ${c.retorno==="condicionado"?"selected":""}>⚠️ Condicionado</option>
          <option value="reprovado" ${c.retorno==="reprovado"?"selected":""}>❌ Reprovado</option>
        </select>
      </td>
      <td>R$ ${c.valor||'—'}</td>
      <td>R$ ${c.valorImovel||'—'}</td>
      <td><input class="table-input" value="${c.status||''}" placeholder="—" oninput="window._g6.alterarStatus(${i},this.value)"></td>
      <td><span class="badge-etapa">${etapas[c.etapa]}</span></td>
      <td>
        <select onchange="window._g6.alterarBanco(${i},this.value)" class="select-table">
          <option ${c.bancos==="Bradesco"?"selected":""}>Bradesco</option>
          <option ${c.bancos==="Itaú"?"selected":""}>Itaú</option>
          <option ${c.bancos==="Santander"?"selected":""}>Santander</option>
          <option ${c.bancos==="Inter"?"selected":""}>Inter</option>
          <option ${c.bancos==="Caixa"?"selected":""}>Caixa</option>
        </select>
      </td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-next" data-tip="Avançar etapa" onclick="window._g6.avancar(${i})">→</button>
          <button class="btn-icon btn-delete" data-tip="Excluir cliente" onclick="window._g6.pedirExclusao(${i})">✕</button>
        </div>
      </td>`;
    tbody.appendChild(row);

    if(etapas[c.etapa]==="Registro"){
      const regRow=document.createElement("tr");
      regRow.innerHTML=`<td colspan="9" style="padding:6px 14px 14px;">
        <div class="registro-box">
          <b>📄 Dados do Registro</b>
          <select onchange="window._g6.alterarCampoRegistro(${i},'registro',this.value)">
            <option value="">Selecione o Cartório</option>
            <option value="1" ${c.registro=="1"?"selected":""}>1º Registro</option>
            <option value="2" ${c.registro=="2"?"selected":""}>2º Registro</option>
          </select>
          ${c.registro?`<a class="btn-registro-link" href="${obterLinkRegistro(c.registro)}" target="_blank">🔗 Acessar ${c.registro}º RI</a>`:''}
          <button class="btn-salvar-reg" onclick="window._g6.salvarRegistro(${i})">💾 Salvar</button>
        </div></td>`;
      tbody.appendChild(regRow);
    }
  });

  atualizarDashboard(); atualizarPipeline();
}

function atualizarDashboard(){
  document.getElementById("totalClientes").innerText=clientes.length;
  document.getElementById("totalAprovados").innerText=clientes.filter(c=>c.retorno==="aprovado").length;
  document.getElementById("totalContratacao").innerText=clientes.filter(c=>etapas[c.etapa]==="Contratação").length;
}

function atualizarPipeline(){
  const pipe=document.getElementById("pipeline");
  pipe.innerHTML="";
  etapas.forEach((e,i)=>{
    const total=clientes.filter(c=>c.etapa===i).length;
    const d=document.createElement("div");
    d.className=`step${filtroEtapa===i?' active':''}`;
    d.innerHTML=`<strong>${total}</strong>${e}`;
    d.onclick=()=>filtrarEtapa(i);
    pipe.appendChild(d);
  });
  const all=document.createElement("div");
  all.className="step clear";
  all.innerHTML=`<strong>↺</strong>Ver Todos`;
  all.onclick=limparFiltro;
  pipe.appendChild(all);
}

document.getElementById("modalOverlay").addEventListener("click",function(e){ if(e.target===this) fecharModal(); });
